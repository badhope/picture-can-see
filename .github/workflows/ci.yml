name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: echo "Code formatting check passed"

  test-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Verify web files
        run: |
          echo "Verifying web application files..."
          test -f web/index.html
          test -f web/src/main.js
          test -f web/styles/main.css
          echo "Web version ready for deployment"

  test-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\npm-cache
          key: ${{ runner.os }}-desktop-${{ hashFiles('desktop/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-desktop-

      - name: Cache node modules (macOS/Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-desktop-${{ hashFiles('desktop/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-desktop-

      - name: Install dependencies
        run: npm ci

      - name: Verify desktop files
        run: |
          echo "Verifying desktop application files..."
          test -f desktop/main.js
          test -f desktop/preload.js
          test -f desktop/index.html
          test -f desktop/src/main.js
          echo "Desktop dependencies installed successfully"
