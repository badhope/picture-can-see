<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>
  
  <g transform="translate(40, 60)">
    <rect x="0" y="80" width="30" height="60" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    <rect x="45" y="50" width="30" height="90" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    <rect x="90" y="30" width="30" height="110" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    <rect x="135" y="60" width="30" height="80" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    
    <polyline points="15,70 60,40 105,20 150,50" 
              fill="none" 
              stroke="url(#lineGrad)" 
              stroke-width="6" 
              stroke-linecap="round" 
              stroke-linejoin="round"/>
    
    <circle cx="15" cy="70" r="8" fill="#f59e0b"/>
    <circle cx="60" cy="40" r="8" fill="#f59e0b"/>
    <circle cx="105" cy="20" r="8" fill="#f59e0b"/>
    <circle cx="150" cy="50" r="8" fill="#f59e0b"/>
  </g>
  
  <text x="128" y="230" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">
    PCS
  </text>
</svg>
